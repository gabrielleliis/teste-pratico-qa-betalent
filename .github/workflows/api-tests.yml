name: Execução de Testes de API - BeTalent

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Instalar Newman (Postman CLI)
        run: npm install -g newman

      - name: Rodar Collection do Restful-Booker
        # Injetamos a variável de ambiente dinamicamente no momento da execução
        run: newman run "BeTalent - Restful-Booker API.postman_collection.json" --env-var "base_url=https://restful-booker.herokuapp.com"